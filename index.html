<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Court File Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>

body{font-family:system-ui;background:#f2f4f7;margin:0;padding:10px}

.section{background:#fff;padding:14px;margin-bottom:12px;border-radius:12px}

input,button,select{
width:100%;padding:12px;margin-top:8px;font-size:15px;border-radius:10px;border:1px solid #ccc
}

button{background:#1976d2;color:#fff;border:none}

.scan-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.dashboard{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}

.card{background:#fff;padding:10px;border-radius:10px;text-align:center;font-weight:600}

.table-wrap{background:#fff;border-radius:12px;overflow-x:auto}

table{width:100%;border-collapse:collapse;min-width:900px}

th,td{border:1px solid #ddd;padding:6px;font-size:13px}

#scannerWrap{position:fixed;inset:0;background:#000;display:none;z-index:999}

#video{width:100%;height:75vh;object-fit:cover}

#scanBox{position:absolute;top:25%;left:15%;width:70%;height:50%;border:4px solid #00ff00;border-radius:10px}

#nextDatePopup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:1000}

#popupBox{background:#fff;margin:25% auto;padding:20px;width:90%;border-radius:12px}

.highlight{
background:#fff3cd;
animation:blink 1s 3;
}

@keyframes blink{
0%{background:#fff3cd}
50%{background:#ffffff}
100%{background:#fff3cd}
}

</style>
</head>

<body>

<div class="section">
<h3>📅 Working Date</h3>
<input type="date" id="workDate">
<select id="versionSelect"></select>
</div>

<div class="dashboard">
<div class="card">📁 Total<br><span id="totalCount">0</span></div>
<div class="card">📤 Sent<br><span id="sentCount">0</span></div>
<div class="card">📥 Received<br><span id="receivedCount">0</span></div>
<div class="card">💾 Storage<br><span id="storageUsage">...</span></div>
</div>

<div class="section">
<h3>📥 Excel Upload</h3>
<input type="file" id="excelFile">
<button onclick="uploadExcel()">Upload Excel</button>
</div>

<div class="section">
<h3>🔍 Search</h3>
<input type="text" id="searchBox">
</div>

<div class="section">
<h3>📷 Scan</h3>
<div class="scan-grid">
<button onclick="scanSent()">📤 Scan SENT</button>
<button onclick="scanReceived()">📥 Scan RECEIVED</button>
</div>
</div>

<div class="section">
<button onclick="downloadExcel()">📤 Download Excel</button>
</div>

<div class="section">
<button onclick="deleteOldData()">🧹 Delete Data Older Than 15 Days</button>
</div>

<div class="table-wrap">
<table id="table"></table>
</div>

<div id="scannerWrap">
<div style="position:relative">
<video id="video"></video>
<div id="scanBox"></div>
</div>
<button onclick="stopScanner()">Close Scanner</button>
</div>

<div id="nextDatePopup">
<div id="popupBox">
<h3>📅 Next Date</h3>
<input type="date" id="nextDateInput">
<button onclick="saveNextDate()">Save</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

/* ===================== INDEXEDDB WRAPPER =====================
   localStorage की जगह IndexedDB use हो रहा है।
   IndexedDB: 50MB – 1GB+ storage (browser/device के हिसाब से)
   सभी operations async/await हैं।
============================================================= */

let _db = null

function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db)
    const req = indexedDB.open("CourtFileDB", 1)
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore("data", { keyPath: "key" })
    }
    req.onsuccess = e => {
      _db = e.target.result
      resolve(_db)
    }
    req.onerror = () => reject(req.error)
  })
}

async function idbGet(key) {
  const db = await openDB()
  return new Promise((resolve, reject) => {
    const req = db.transaction("data", "readonly")
      .objectStore("data").get(key)
    req.onsuccess = () => resolve(req.result ? req.result.value : null)
    req.onerror = () => reject(req.error)
  })
}

async function idbSet(key, value) {
  const db = await openDB()
  return new Promise((resolve, reject) => {
    const req = db.transaction("data", "readwrite")
      .objectStore("data").put({ key, value })
    req.onsuccess = () => resolve()
    req.onerror = () => reject(req.error)
  })
}

async function idbDelete(key) {
  const db = await openDB()
  return new Promise((resolve, reject) => {
    const req = db.transaction("data", "readwrite")
      .objectStore("data").delete(key)
    req.onsuccess = () => resolve()
    req.onerror = () => reject(req.error)
  })
}

async function idbGetAllKeys() {
  const db = await openDB()
  return new Promise((resolve, reject) => {
    const req = db.transaction("data", "readonly")
      .objectStore("data").getAllKeys()
    req.onsuccess = () => resolve(req.result)
    req.onerror = () => reject(req.error)
  })
}

/* ===================== STORAGE USAGE ===================== */

async function updateStorageUsage() {
  if (navigator.storage && navigator.storage.estimate) {
    const { usage, quota } = await navigator.storage.estimate()
    const pct = ((usage / quota) * 100).toFixed(1)
    const usedMB = (usage / (1024 * 1024)).toFixed(1)
    const quotaMB = (quota / (1024 * 1024 * 1024)).toFixed(1)
    storageUsage.innerText = `${pct}% (${usedMB}MB / ${quotaMB}GB)`
  } else {
    storageUsage.innerText = "N/A"
  }
}

/* ===================== DELETE OLD DATA ===================== */

async function deleteOldData() {
  const today = new Date()
  const allKeys = await idbGetAllKeys()
  let deleted = 0

  for (const key of allKeys) {
    if (String(key).startsWith("court_")) {
      const dateStr = String(key).replace("court_", "").split("_")[0]
      const fileDate = new Date(dateStr)
      const diff = (today - fileDate) / (1000 * 60 * 60 * 24)
      if (diff > 15) {
        await idbDelete(key)
        deleted++
      }
    }
  }

  alert(deleted + " records deleted")
  await updateStorageUsage()
}

/* ===================== FIREBASE ===================== */

const firebaseConfig = {
  apiKey: "AIzaSyCOeaQ3R9hTqVqpBDw9v3RNWE-P7rYQg64",
  authDomain: "court-file-system.firebaseapp.com",
  projectId: "court-file-system"
}

firebase.initializeApp(firebaseConfig)
const dbCloud = firebase.firestore()

/* ===================== VARIABLES ===================== */

let currentData = []
let uploadVersion = 1
let scanMode = ""
let scanner = null
let lastReceivedIndex = null
let unsubscribe = null

let lastScanCode = ""
let lastScanTime = 0

/* ===================== VOICE ===================== */

function speak(msg) {
  const speech = new SpeechSynthesisUtterance(msg)
  speech.lang = "en-IN"
  speech.rate = 1
  speechSynthesis.speak(speech)
}

function speakNextDate(dateStr) {
  if (!dateStr) return
  const d = new Date(dateStr)
  const day = d.getDate()
  const month = d.toLocaleString("en-IN", { month: "long" })
  speak("Next date " + day + " " + month)
}

/* ===================== STORAGE KEYS ===================== */

function versionKey()        { return "versions_"         + workDate.value }
function dataKey()           { return "court_"            + workDate.value + "_" + uploadVersion }
function currentVersionKey() { return "current_version_"  + workDate.value }

/* ===================== PAGE LOAD ===================== */

window.onload = async () => {
  const today = new Date().toISOString().split("T")[0]
  workDate.value = today

  await loadVersions()
  await loadCurrentVersion()
  await loadLocal()
  loadFirebase()
  await updateStorageUsage()
}

/* ===================== DASHBOARD ===================== */

function updateDashboard() {
  totalCount.innerText    = currentData.length
  sentCount.innerText     = currentData.filter(x => x.sent === "Sent").length
  receivedCount.innerText = currentData.filter(x => x.received === "Received").length
}

/* ===================== VERSION STORAGE ===================== */

async function saveVersions(arr) {
  await idbSet(versionKey(), arr)
}

async function loadVersions() {
  versionSelect.innerHTML = ""
  const saved = await idbGet(versionKey())
  if (!saved) return
  saved.forEach(v => {
    const opt = document.createElement("option")
    opt.value = v
    opt.text  = "Upload " + v
    versionSelect.appendChild(opt)
  })
}

/* ===================== CURRENT VERSION ===================== */

async function saveCurrentVersion() {
  await idbSet(currentVersionKey(), uploadVersion)
}

async function loadCurrentVersion() {
  const v = await idbGet(currentVersionKey())
  if (v) {
    uploadVersion = parseInt(v)
    versionSelect.value = uploadVersion
  }
}

/* ===================== LOCAL DATA ===================== */

async function saveLocal() {
  await idbSet(dataKey(), currentData)
  await updateStorageUsage()
}

async function loadLocal() {
  const saved = await idbGet(dataKey())
  if (saved) {
    currentData = saved
    drawTable(currentData)
    updateDashboard()
  }
}

/* ===================== FIREBASE ===================== */

function syncFirebase() {
  const id = workDate.value + "_" + uploadVersion
  dbCloud.collection("courtfiles").doc(id).set({ data: currentData }, { merge: true })
}

function loadFirebase() {
  const id = workDate.value + "_" + uploadVersion

  if (unsubscribe) {
    unsubscribe()
    unsubscribe = null
  }

  unsubscribe = dbCloud.collection("courtfiles").doc(id).onSnapshot(doc => {
    if (doc.exists) {
      currentData = doc.data().data
      drawTable(currentData)
      updateDashboard()
    }
  })
}

/* ===================== DATE / VERSION CHANGE ===================== */

workDate.addEventListener("change", async () => {
  await loadVersions()
  await loadCurrentVersion()
  await loadLocal()
  loadFirebase()
})

versionSelect.addEventListener("change", async () => {
  uploadVersion = parseInt(versionSelect.value)
  await saveCurrentVersion()
  await loadLocal()
  loadFirebase()
})

/* ===================== UPLOAD ===================== */

async function uploadExcel() {
  const file = excelFile.files[0]
  if (!file) { alert("Select Excel"); return }

  let versions = await idbGet(versionKey()) || []
  if (!Array.isArray(versions)) versions = []

  uploadVersion = versions.length + 1

  const reader = new FileReader()

  reader.onload = async e => {
    const wb   = XLSX.read(e.target.result, { type: "binary" })
    const rows = XLSX.utils.sheet_to_json(
      wb.Sheets[wb.SheetNames[0]],
      { header: 1, defval: "" }
    )

    rows.shift()

    currentData = rows.map(r => ({
      srno        : r[0] || "",
      caseno      : String(r[1] || "").trim(),
      partyname   : r[2] || "",
      section     : r[3] || "",
      ps          : r[4] || "",
      sent        : "",
      received    : "",
      receiveddate: "",
      nextdate    : "",
      remark      : ""
    }))

    const opt = document.createElement("option")
    opt.value = uploadVersion
    opt.text  = "Upload " + uploadVersion
    versionSelect.appendChild(opt)
    versionSelect.value = uploadVersion

    versions.push(uploadVersion)

    await saveVersions(versions)
    await saveCurrentVersion()

    drawTable(currentData)
    updateDashboard()

    await saveLocal()
    syncFirebase()

    excelFile.value = ""
  }

  reader.readAsBinaryString(file)
}

/* ===================== SCANNER ===================== */

function scanSent()     { scanMode = "SENT";     startScanner() }
function scanReceived() { scanMode = "RECEIVED"; startScanner() }

async function startScanner() {
  scannerWrap.style.display = "block"
  scanner = new ZXing.BrowserQRCodeReader()
  const devices = await scanner.listVideoInputDevices()
  const cam = devices.find(d => d.label.toLowerCase().includes("back")) || devices[0]
  scanner.decodeFromVideoDevice(cam.deviceId, "video", result => {
    if (result) handleScan(result.text.trim())
  })
}

function stopScanner() {
  if (scanner) { scanner.reset(); scanner = null }
  scannerWrap.style.display = "none"
}

/* ===================== SCAN ===================== */

async function handleScan(code) {
  const now = Date.now()
  if (code === lastScanCode && now - lastScanTime < 1000) return
  lastScanCode = code
  lastScanTime = now

  const idx = currentData.findIndex(r => r.caseno === code)

  if (idx === -1) {
    alert("❌ File Not Found")
    speak("File not found")
    return
  }

  if (scanMode === "SENT") {
    if (currentData[idx].sent === "Sent") {
      alert("❌ Already Sent")
      speak("Already sent")
      return
    }
    currentData[idx].sent = "Sent"
    alert("✅ Sent")
    speak("File sent")
  }

  if (scanMode === "RECEIVED") {
    if (currentData[idx].sent !== "Sent") {
      alert("❌ File Not Sent Yet")
      speak("File not sent yet")
      return
    }
    if (currentData[idx].received === "Received") {
      alert("❌ Already Received")
      speak("Already received")
      return
    }
    currentData[idx].received    = "Received"
    currentData[idx].receiveddate = new Date().toISOString().split("T")[0]
    lastReceivedIndex = idx
    alert("📥 Received")
    speak("File received")

    nextDatePopup.style.display = "block"
    setTimeout(() => {
      nextDateInput.focus()
      if (nextDateInput.showPicker) nextDateInput.showPicker()
    }, 200)
  }

  drawTable(currentData)
  scrollToFile(code)
  updateDashboard()

  await saveLocal()
  syncFirebase()
}

/* ===================== SCROLL ===================== */

function scrollToFile(caseno) {
  const row = document.getElementById("row_" + caseno)
  if (!row) return
  row.scrollIntoView({ behavior: "smooth", block: "center" })
  row.classList.add("highlight")
  setTimeout(() => row.classList.remove("highlight"), 3000)
}

/* ===================== NEXT DATE ===================== */

async function saveNextDate() {
  if (lastReceivedIndex == null) return
  const selectedDate = nextDateInput.value
  currentData[lastReceivedIndex].nextdate = selectedDate
  nextDatePopup.style.display = "none"
  drawTable(currentData)
  speakNextDate(selectedDate)
  await saveLocal()
  syncFirebase()
}

function closePopup() {
  nextDatePopup.style.display = "none"
}

/* ===================== REMARK ===================== */

async function updateRemark(i, val) {
  currentData[i].remark = val
  await saveLocal()
  syncFirebase()
}

/* ===================== TABLE ===================== */

function drawTable(data) {
  if (!data.length) { table.innerHTML = ""; return }

  const headers = [
    "srno","caseno","partyname","section","ps",
    "sent","received","receiveddate","nextdate","remark"
  ]

  let html = "<tr>" + headers.map(x => "<th>" + x + "</th>").join("") + "</tr>"

  data.forEach(r => {
    const index = currentData.findIndex(x => x.caseno === r.caseno)
    let row = `<tr id="row_${r.caseno}">`

    headers.forEach(k => {
      if (k === "remark") {
        row += `<td><input value="${r[k] || ""}" onchange="updateRemark(${index},this.value)"></td>`
      } else {
        row += `<td>${r[k] || ""}</td>`
      }
    })

    row += "</tr>"
    html += row
  })

  table.innerHTML = html
}

/* ===================== SEARCH ===================== */

searchBox.addEventListener("input", () => {
  const q = searchBox.value.toLowerCase()
  const filtered = q
    ? currentData.filter(r => Object.values(r).join(" ").toLowerCase().includes(q))
    : currentData
  drawTable(filtered)
})

/* ===================== DOWNLOAD ===================== */

function downloadExcel() {
  const ws = XLSX.utils.json_to_sheet(currentData)
  const wb = XLSX.utils.book_new()
  XLSX.utils.book_append_sheet(wb, ws, "Court Data")
  XLSX.writeFile(wb, "Court_" + workDate.value + ".xlsx")
}

</script>

</body>
</html>
