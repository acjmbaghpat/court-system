<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Court Diary</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><script src="https://unpkg.com/html5-qrcode"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><style>
body{font-family:system-ui;background:#f2f4f7;margin:0;padding:8px}

.section{
background:#fff;
padding:14px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,.08)
}

h3{margin:0 0 8px 0;font-size:15px}

input,button,select{
width:100%;
padding:12px;
margin-top:8px;
font-size:15px;
border-radius:10px
}

input,select{border:1px solid #ccc}

button{
border:none;
background:#1976d2;
color:#fff;
font-weight:600
}

.scan-actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px
}

.table-wrap{
background:#fff;
border-radius:12px;
overflow-x:auto
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
font-size:13px
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left
}

th{background:#e9ecf1}

#scannerWrap{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:999
}

#reader{
width:100%;
height:70vh
}

#scanBox{
position:absolute;
top:25%;
left:15%;
width:70%;
height:50%;
border:4px solid #00ff00;
border-radius:10px
}

#nextDatePopup{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
z-index:1000
}

#popupBox{
background:#fff;
margin:25% auto;
padding:20px;
width:90%;
border-radius:12px
}

#stats{
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:6px;
margin-top:6px
}

.statbox{
background:#f1f3f7;
padding:8px;
border-radius:8px;
text-align:center;
font-weight:600;
font-size:13px
}
</style></head><body><div class="section">
<h3>📅 Working Date</h3>
<input type="date" id="workDate">
<select id="versionSelect"></select>
</div><div class="section">
<h3>📤 Excel Upload</h3>
<input type="file" id="excelFile">
<button onclick="uploadExcel()">⬆️ Upload Excel</button>
</div><div class="section">
<h3>🔍 Search</h3>
<input type="text" id="searchBox" placeholder="Search case / party">
</div><div class="section">
<h3>📷 Scan Files</h3>
<div class="scan-actions">
<button onclick="scanSent()">📤 Scan SENT</button>
<button onclick="scanReceived()">📥 Scan RECEIVED</button>
</div>
</div><div class="section">
<h3>📊 File Status</h3>
<div id="stats"></div>
</div><div class="section">
<button onclick="downloadExcel()">📥 Download Excel</button>
</div><div class="table-wrap">
<table id="table"></table>
</div><div id="scannerWrap">
<div id="reader"></div>
<button onclick="stopScanner()">❌ Close Scanner</button>
</div><div id="nextDatePopup">
<div id="popupBox">
<h3>📅 Select Next Date</h3>
<input type="date" id="nextDateInput">
<button onclick="saveNextDate()">💾 Save</button>
</div>
</div><script>

let currentData=[];
let scanMode="";
let lastReceivedIndex=null;
let currentSearch="";
let html5QrCode;

searchBox.addEventListener("input",()=>{
currentSearch=searchBox.value.toLowerCase();
applySearch();
});

function applySearch(){

let filtered=currentSearch
? currentData.filter(r=>
(r.caseno+" "+r.partyname+" "+r.section+" "+r.ps)
.toLowerCase().includes(currentSearch))
: currentData;

drawTable(filtered);
updateStats();
}

function updateStats(){

let total=currentData.length;
let sent=currentData.filter(r=>r.sent==="YES").length;
let received=currentData.filter(r=>r.received==="YES").length;
let pending=sent-received;

stats.innerHTML=`
<div class="statbox">Total<br>${total}</div>
<div class="statbox">Sent<br>${sent}</div>
<div class="statbox">Received<br>${received}</div>
<div class="statbox">Pending<br>${pending}</div>
`;

}

function scanSent(){
scanMode="SENT";
startScanner();
}

function scanReceived(){
scanMode="RECEIVED";
startScanner();
}

function startScanner(){

scannerWrap.style.display="block";

html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(decodedText)=>{

html5QrCode.stop();
stopScanner();
handleScan(decodedText);

}
);

}

function stopScanner(){
scannerWrap.style.display="none";
}

function handleScan(code){

let cleanCode=code.replace(/\s/g,"").toLowerCase();

let idx=currentData.findIndex(r=>
r.caseno.replace(/\s/g,"").toLowerCase()===cleanCode
);

if(idx===-1){
alert("File Not Found");
return;
}

if(scanMode==="SENT"){

if(currentData[idx].sent==="YES"){
alert("Already Sent");
return;
}

currentData[idx].sent="YES";
applySearch();
alert("Sent");

}

if(scanMode==="RECEIVED"){

if(currentData[idx].received==="YES"){
alert("Already Received");
return;
}

currentData[idx].received="YES";
lastReceivedIndex=idx;

nextDatePopup.style.display="block";
applySearch();

}

}

function saveNextDate(){

currentData[lastReceivedIndex].nextdate=nextDateInput.value;
nextDatePopup.style.display="none";
applySearch();

}

function drawTable(data){

table.innerHTML="";

if(!data.length)return;

let h=Object.keys(data[0]);

table.innerHTML="<tr>"+h.map(x=>"<th>"+x+"</th>").join("")+"</tr>";

data.forEach((r,i)=>{

let row="<tr>";

h.forEach(k=>{

if(k==="remark"){

row+=`<td><input value="${r[k]||""}" onchange="r.remark=this.value"></td>`;

}else{

row+=`<td>${r[k]||""}</td>`;

}

});

row+="</tr>";
table.innerHTML+=row;

});

}

function uploadExcel(){

let file=excelFile.files[0];
if(!file){alert("Select Excel");return;}

let reader=new FileReader();

reader.onload=e=>{

let wb=XLSX.read(e.target.result,{type:"binary"});

let rows=XLSX.utils.sheet_to_json(
wb.Sheets[wb.SheetNames[0]],
{header:1}
);

rows.shift();

currentData=rows.map(r=>({
srno:r[0]||"",
caseno:String(r[1]||"").trim(),
partyname:r[2]||"",
section:r[3]||"",
ps:r[4]||"",
sent:"",
received:"",
nextdate:"",
remark:""
}));

applySearch();

};

reader.readAsBinaryString(file);

}

function downloadExcel(){

let ws=XLSX.utils.json_to_sheet(currentData);
let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Court");

XLSX.writeFile(wb,"court_data.xlsx");

}

</script></body>
</html>
