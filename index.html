<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Court File Manager (IndexedDB)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
body{font-family:system-ui;background:#f2f4f7;margin:0;padding:10px}
.section{background:#fff;padding:14px;margin-bottom:12px;border-radius:12px}
input,button,select{width:100%;padding:12px;margin-top:8px;font-size:15px;border-radius:10px;border:1px solid #ccc}
button{background:#1976d2;color:#fff;border:none}
.scan-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dashboard{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.card{background:#fff;padding:10px;border-radius:10px;text-align:center;font-weight:600}
.table-wrap{background:#fff;border-radius:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
th,td{border:1px solid #ddd;padding:6px;font-size:13px}
#scannerWrap{position:fixed;inset:0;background:#000;display:none;z-index:999}
#video{width:100%;height:75vh}
#nextDatePopup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:1000}
#popupBox{background:#fff;margin:25% auto;padding:20px;width:90%;border-radius:12px}
.highlight{background:#fff3cd;animation:blink 1s 3}
@keyframes blink{0%{background:#fff3cd}50%{background:#ffffff}100%{background:#fff3cd}}
</style>
</head>
<body>

<div class="section">
  <h3>📅 Working Date</h3>
  <input type="date" id="workDate">
  <select id="versionSelect"></select>
</div>

<div class="dashboard">
  <div class="card">📁 Total<br><span id="totalCount">0</span></div>
  <div class="card">📤 Sent<br><span id="sentCount">0</span></div>
  <div class="card">📥 Received<br><span id="receivedCount">0</span></div>
  <div class="card">💾 Storage<br><span id="storageUsage">...</span></div>
</div>

<div class="section">
  <h3>📥 Excel Upload</h3>
  <input type="file" id="excelFile">
  <button onclick="uploadExcel()">Upload Excel</button>
</div>

<div class="section">
  <h3>🔍 Search</h3>
  <input type="text" id="searchBox">
</div>

<div class="section">
  <h3>📷 Scan</h3>
  <div class="scan-grid">
    <button onclick="scanSent()">📤 Scan SENT</button>
    <button onclick="scanReceived()">📥 Scan RECEIVED</button>
  </div>
</div>

<div class="section">
  <button onclick="downloadExcel()">📤 Download Excel</button>
</div>

<div class="table-wrap">
  <table id="table"></table>
</div>

<div class="section">
  <button onclick="deleteOldData()">🧹 Delete Data Older Than 30 Days</button>
</div>

<div id="scannerWrap">
  <div id="video"></div>
  <button onclick="stopScanner()">Close Scanner</button>
</div>

<div id="nextDatePopup">
  <div id="popupBox">
    <h3>📅 Next Date</h3>
    <input type="date" id="nextDateInput">
    <button onclick="saveNextDate()">Save</button>
    <button onclick="closePopup()">Cancel</button>
  </div>
</div>

<script>

// ===================== IndexedDB Setup =====================
const DB_NAME = 'CourtFileManagerDB';
const DB_VERSION = 1;
const STORE_VERSIONS = 'versions';
const STORE_METADATA = 'metadata';

let db;

function openDatabase() {
    return new Promise((resolve, reject) => {
        if (db) return resolve(db);
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
            const dbInstance = event.target.result;
            if (!dbInstance.objectStoreNames.contains(STORE_VERSIONS)) {
                dbInstance.createObjectStore(STORE_VERSIONS, { keyPath: 'workDate' });
            }
            if (!dbInstance.objectStoreNames.contains(STORE_METADATA)) {
                dbInstance.createObjectStore(STORE_METADATA, { keyPath: 'key' });
            }
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            resolve(db);
        };

        request.onerror = (event) => {
            console.error("IndexedDB error:", event.target.errorCode);
            reject("IndexedDB error: " + event.target.errorCode);
        };
    });
}

async function getObjectStore(storeName, mode) {
    if (!db) await openDatabase();
    const transaction = db.transaction(storeName, mode);
    return transaction.objectStore(storeName);
}

async function idbDeleteMetadata(key) {
    const store = await getObjectStore(STORE_METADATA, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.delete(key);
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbGetVersions(workDate) {
    const store = await getObjectStore(STORE_VERSIONS, 'readonly');
    return new Promise((resolve, reject) => {
        const request = store.get(workDate);
        request.onsuccess = () => resolve(request.result ? request.result.versions : []);
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbSaveVersions(workDate, versions) {
    const store = await getObjectStore(STORE_VERSIONS, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.put({ workDate, versions });
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbGetCurrentVersion(workDate) {
    const store = await getObjectStore(STORE_METADATA, 'readonly');
    return new Promise((resolve, reject) => {
        const request = store.get('current_version_' + workDate);
        request.onsuccess = () => resolve(request.result ? request.result.value : 1);
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbSaveCurrentVersion(workDate, version) {
    const store = await getObjectStore(STORE_METADATA, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.put({ key: 'current_version_' + workDate, value: version });
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

// ===================== Helpers =====================
function sanitizeId(id) {
    return String(id || "").replace(/[^a-zA-Z0-9-_]/g, '_');
}

function generateSearchableText(record) {
    const keys = ["srno","caseno","partyname","section","ps","sent","received","receiveddate","nextdate","remark"];
    return keys.map(k => record[k] || "").join(' ').toLowerCase();
    // FIX 4 side-effect: searchableText itself is NOT included, so generateSearchableText won't recurse
}

// ===================== Speaker =====================
function speak(msg) {
    let speech = new SpeechSynthesisUtterance(msg);
    speech.lang = "en-IN";
    speech.rate = 1;
    speechSynthesis.speak(speech);
}

function speakNextDate(dateStr) {
    if (!dateStr) return;
    let d = new Date(dateStr);
    let day = d.getDate();
    let month = d.toLocaleString("en-IN", { month: "long" });
    speak("Next date " + day + " " + month);
}

// ===================== BUG 1 FIX: Storage — actual MB dikhao =====================
async function updateStorageUsage() {
    try {
        if (navigator.storage && navigator.storage.estimate) {
            const estimate = await navigator.storage.estimate();
            const usedMB = (estimate.usage / (1024 * 1024)).toFixed(2);
            const totalMB = (estimate.quota / (1024 * 1024)).toFixed(0);
            const pct = ((estimate.usage / estimate.quota) * 100).toFixed(1);
            storageUsage.innerText = usedMB + "MB / " + totalMB + "MB (" + pct + "%)";
        } else {
            storageUsage.innerText = "IndexedDB";
        }
    } catch(e) {
        storageUsage.innerText = "IndexedDB";
    }
}

// ===================== BUG 5 FIX: Delete Old Data — STORE_VERSIONS bhi clean karo =====================
async function deleteOldData() {
    let today = new Date();
    let deletedCount = 0;

    try {
        // 1. STORE_METADATA se purani data entries delete karo
        const metaStore = await getObjectStore(STORE_METADATA, 'readwrite');
        const metaKeys = await new Promise((resolve, reject) => {
            const req = metaStore.getAllKeys();
            req.onsuccess = () => resolve(req.result);
            req.onerror = (e) => reject(e.target.error);
        });

        for (const key of metaKeys) {
            if (!key.startsWith('current_version_')) {
                // key format: "2025-01-01_1"
                let datePart = key.substring(0, 10);
                let fileDate = new Date(datePart);
                if (!isNaN(fileDate)) {
                    let diff = (today - fileDate) / (1000 * 60 * 60 * 24);
                    if (diff > 30) {
                        await idbDeleteMetadata(key);
                        deletedCount++;
                    }
                }
            }
        }

        // 2. STORE_VERSIONS se purani date entries delete karo
        const verStore = await getObjectStore(STORE_VERSIONS, 'readwrite');
        const allDates = await new Promise((resolve, reject) => {
            const req = verStore.getAllKeys();
            req.onsuccess = () => resolve(req.result);
            req.onerror = (e) => reject(e.target.error);
        });

        for (const dateKey of allDates) {
            let fileDate = new Date(dateKey);
            if (!isNaN(fileDate)) {
                let diff = (today - fileDate) / (1000 * 60 * 60 * 24);
                if (diff > 30) {
                    await new Promise((resolve, reject) => {
                        const req = verStore.delete(dateKey);
                        req.onsuccess = () => resolve();
                        req.onerror = (e) => reject(e.target.error);
                    });
                }
            }
        }

        alert(deletedCount + " old records deleted.");
        updateStorageUsage();
    } catch (error) {
        console.error("Error deleting old data:", error);
        alert("Failed to delete old data.");
    }
}

// ===================== Firebase =====================
const firebaseConfig = {
    apiKey: "AIzaSyCOeaQ3R9hTqVqpBDw9v3RNWE-P7rYQg64",
    authDomain: "court-file-system.firebaseapp.com",
    projectId: "court-file-system"
};

firebase.initializeApp(firebaseConfig);
const dbCloud = firebase.firestore();

let currentData = [];
let uploadVersion = 1;
let scanMode = "";
let html5Qr = null;
let lastReceivedIndex = null;
let unsubscribe = null;
let lastScanCode = "";
let lastScanTime = 0;

async function dataKey() { return workDate.value + "_" + uploadVersion; }

// ===================== Filter =====================
function getFilteredData() {
    let q = searchBox.value.toLowerCase();
    return q
        ? currentData.filter(r => r.searchableText && r.searchableText.includes(q))
        : currentData;
}

// ===================== Init =====================
window.onload = async () => {
    try {
        await openDatabase();
        let savedDate = localStorage.getItem('lastWorkDate');
        let today = new Date().toISOString().split("T")[0];
        workDate.value = savedDate || today;

        await loadVersions();
        await loadCurrentVersion();
        await loadLocal();
        loadFirebase();
        updateStorageUsage();
    } catch (e) {
        console.error("Initialization error:", e);
    }
};

// ===================== Dashboard =====================
function updateDashboard() {
    totalCount.innerText = currentData.length;
    sentCount.innerText = currentData.filter(x => x.sent === "Sent").length;
    receivedCount.innerText = currentData.filter(x => x.received === "Received").length;
}

// ===================== Version =====================

// BUG 2 FIX: saveVersions ab 2 params leta hai — (date, arr)
async function saveVersions(date, arr) {
    await idbSaveVersions(date, arr);
}

async function loadVersions() {
    versionSelect.innerHTML = "";
    const versions = await idbGetVersions(workDate.value);
    if (versions.length === 0) {
        let opt = document.createElement("option");
        opt.value = "1";
        opt.text = "Upload 1";
        versionSelect.appendChild(opt);
        return;
    }
    versions.forEach(v => {
        let opt = document.createElement("option");
        opt.value = v;
        opt.text = "Upload " + v;
        versionSelect.appendChild(opt);
    });
}

async function saveCurrentVersion() {
    await idbSaveCurrentVersion(workDate.value, uploadVersion);
}

async function loadCurrentVersion() {
    const v = await idbGetCurrentVersion(workDate.value);
    uploadVersion = parseInt(v);
    versionSelect.value = uploadVersion;
}

// ===================== Local Save/Load =====================
async function saveLocal() {
    try {
        const key = await dataKey();
        const store = await getObjectStore(STORE_METADATA, 'readwrite');
        await new Promise((resolve, reject) => {
            const request = store.put({ key: key, value: currentData });
            request.onsuccess = () => resolve();
            request.onerror = (event) => reject(event.target.error);
        });
        updateStorageUsage();
    } catch (e) {
        console.error("Error saving to IndexedDB:", e);
    }
}

async function loadLocal() {
    try {
        const key = await dataKey();
        const store = await getObjectStore(STORE_METADATA, 'readonly');
        const request = store.get(key);
        await new Promise((resolve, reject) => {
            request.onsuccess = () => {
                if (request.result && request.result.value) {
                    currentData = request.result.value;
                    currentData.forEach(r => r.searchableText = generateSearchableText(r));
                } else {
                    currentData = [];
                }
                drawTable(getFilteredData());
                updateDashboard();
                resolve();
            };
            request.onerror = (event) => reject(event.target.error);
        });
    } catch (e) {
        console.error("Error loading from IndexedDB:", e);
        currentData = [];
        drawTable([]);
        updateDashboard();
    }
}

// ===================== Firebase Sync =====================
async function syncFirebase() {
    let id = workDate.value + "_" + uploadVersion;
    try {
        await dbCloud.collection("courtfiles").doc(id).set({ data: currentData }, { merge: true });
    } catch (error) {
        console.error("Error syncing to Firebase:", error);
    }
}

// BUG 3 FIX: onSnapshot se remark input wipe na ho
function loadFirebase() {
    let id = workDate.value + "_" + uploadVersion;
    if (unsubscribe) unsubscribe();
    try {
        unsubscribe = dbCloud.collection("courtfiles").doc(id)
            .onSnapshot(doc => {
                if (doc.exists) {
                    // Active remark input ka caseno aur value bachao
                    let activeEl = document.activeElement;
                    let activeCaseNo = null;
                    let activeValue = null;
                    if (activeEl && activeEl.dataset && activeEl.dataset.caseno) {
                        activeCaseNo = activeEl.dataset.caseno;
                        activeValue = activeEl.value;
                    }

                    let incoming = doc.data().data || [];
                    incoming.forEach(r => {
                        r.searchableText = generateSearchableText(r);
                        // Agar user isi record ka remark type kar raha hai to overwrite mat karo
                        if (activeCaseNo && r.caseno === activeCaseNo) {
                            r.remark = activeValue;
                        }
                    });
                    currentData = incoming;

                    drawTable(getFilteredData());
                    updateDashboard();
                    saveLocal();

                    // Focus aur cursor position restore karo
                    if (activeCaseNo) {
                        setTimeout(() => {
                            let inp = document.querySelector(`input[data-caseno="${CSS.escape(activeCaseNo)}"]`);
                            if (inp) {
                                inp.focus();
                                inp.value = activeValue;
                                inp.setSelectionRange(activeValue.length, activeValue.length);
                            }
                        }, 30);
                    }
                }
            }, error => {
                console.error("Firebase error:", error);
            });
    } catch (error) {
        console.error("Firebase setup error:", error);
    }
}

// ===================== Date / Version Change =====================
workDate.addEventListener("change", async () => {
    localStorage.setItem('lastWorkDate', workDate.value);
    await loadVersions();
    await loadCurrentVersion();
    await loadLocal();
    loadFirebase();
});

versionSelect.addEventListener("change", async () => {
    uploadVersion = parseInt(versionSelect.value);
    await saveCurrentVersion();
    await loadLocal();
    loadFirebase();
});

// ===================== Excel Upload =====================
async function uploadExcel() {
    let file = excelFile.files[0];
    if (!file) { alert("Select Excel"); return; }

    try {
        let versions = await idbGetVersions(workDate.value);
        uploadVersion = versions.length + 1;

        let reader = new FileReader();
        reader.onload = async e => {
            try {
                let data = e.target.result;
                let wb = XLSX.read(data, { type: "binary" });
                let sheetName = wb.SheetNames[0];
                let rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, defval: "" });

                if (rows.length > 0) rows.shift(); // Remove header

                currentData = rows.map(r => {
                    const record = {
                        srno: r[0] || "",
                        caseno: String(r[1] || "").trim(),
                        partyname: r[2] || "",
                        section: r[3] || "",
                        ps: r[4] || "",
                        sent: "",
                        received: "",
                        receiveddate: "",
                        nextdate: "",
                        remark: ""
                    };
                    record.searchableText = generateSearchableText(record);
                    return record;
                }).filter(r => r.caseno !== "");

                let opt = document.createElement("option");
                opt.value = uploadVersion;
                opt.text = "Upload " + uploadVersion;
                versionSelect.appendChild(opt);
                versionSelect.value = uploadVersion;

                versions.push(uploadVersion);
                // BUG 2 FIX: ab 2 sahi params pass ho rahe hain
                await saveVersions(workDate.value, versions);
                await saveCurrentVersion();

                drawTable(getFilteredData());
                updateDashboard();
                await saveLocal();
                syncFirebase();

                speak("Excel uploaded");
                alert("Excel uploaded successfully!");
                excelFile.value = "";
            } catch (err) {
                console.error("Excel processing error:", err);
                alert("Error processing Excel file.");
            }
        };
        reader.onerror = () => alert("Error reading file.");
        reader.readAsBinaryString(file);
    } catch (err) {
        console.error("Upload error:", err);
        alert("Upload failed.");
    }
}

// ===================== Scanner =====================
function scanSent() { scanMode = "SENT"; startScanner(); }
function scanReceived() { scanMode = "RECEIVED"; startScanner(); }

async function startScanner() {
    scannerWrap.style.display = "block";
    html5Qr = new Html5Qrcode("video");
    try {
        let devices = await Html5Qrcode.getCameras();
        if (devices.length === 0) {
            alert("No camera found.");
            stopScanner();
            return;
        }
        let cam = devices.find(d => d.label.toLowerCase().includes("back")) || devices[devices.length - 1];
        html5Qr.start(
            cam.id,
            { fps: 10, qrbox: 250 },
            (text) => handleScan(text.trim())
        );
    } catch (error) {
        console.error("Scanner error:", error);
        stopScanner();
    }
}

function stopScanner() {
    if (html5Qr) {
        html5Qr.stop().then(() => html5Qr.clear()).catch(e => console.error(e));
        html5Qr = null;
    }
    scannerWrap.style.display = "none";
}

async function handleScan(code) {
    let now = Date.now();
    if (code === lastScanCode && now - lastScanTime < 1500) return;
    lastScanCode = code;
    lastScanTime = now;

    let idx = currentData.findIndex(r => r.caseno === code);
    if (idx === -1) { alert("File Not Found"); speak("File not found"); return; }

    if (scanMode === "SENT") {
        if (currentData[idx].sent === "Sent") { alert("Already Sent"); speak("Already sent"); return; }
        currentData[idx].sent = "Sent";
        alert("Sent");
        speak("File sent");
    }

    if (scanMode === "RECEIVED") {
        if (currentData[idx].sent !== "Sent") { alert("File Not Sent Yet"); speak("File not sent yet"); return; }
        if (currentData[idx].received === "Received") { alert("Already Received"); speak("Already received"); return; }
        currentData[idx].received = "Received";
        currentData[idx].receiveddate = new Date().toISOString().split("T")[0];
        lastReceivedIndex = idx;
        alert("Received");
        speak("File received");
        nextDatePopup.style.display = "block";
    }

    drawTable(getFilteredData());
    scrollToFile(code);
    updateDashboard();
    await saveLocal();
    syncFirebase();
}

// ===================== Scroll =====================
function scrollToFile(caseno) {
    let sanitizedCaseno = sanitizeId(caseno);
    let row = document.getElementById("row_" + sanitizedCaseno);
    if (!row) return;
    row.scrollIntoView({ behavior: "smooth", block: "center" });
    row.classList.add("highlight");
    setTimeout(() => { row.classList.remove("highlight"); }, 3000);
}

// ===================== Next Date =====================
async function saveNextDate() {
    if (lastReceivedIndex === null) return;
    let selectedDate = nextDateInput.value;
    if (!selectedDate) { alert("Please select a date"); return; }
    currentData[lastReceivedIndex].nextdate = selectedDate;
    nextDateInput.value = '';
    nextDatePopup.style.display = "none";
    lastReceivedIndex = null;
    drawTable(getFilteredData());
    speakNextDate(selectedDate);
    await saveLocal();
    syncFirebase();
}

function closePopup() {
    nextDatePopup.style.display = "none";
    lastReceivedIndex = null;
}

// ===================== Remark =====================
let remarkTimeout;
async function updateRemark(caseNo, val) {
    clearTimeout(remarkTimeout);
    remarkTimeout = setTimeout(async () => {
        let idx = currentData.findIndex(r => r.caseno === caseNo);
        if (idx !== -1) {
            currentData[idx].remark = val;
            currentData[idx].searchableText = generateSearchableText(currentData[idx]);
            await saveLocal();
            syncFirebase();
        }
    }, 400);
}

// ===================== Table =====================
function drawTable(data) {
    if (!data || !data.length) { table.innerHTML = ""; return; }
    let headers = ["srno", "caseno", "partyname", "section", "ps", "sent", "received", "receiveddate", "nextdate", "remark"];
    let html = "<tr>" + headers.map(x => "<th>" + x + "</th>").join("") + "</tr>";
    data.forEach(r => {
        let sanitizedCaseno = sanitizeId(r.caseno);
        let row = `<tr id="row_${sanitizedCaseno}">`;
        headers.forEach(k => {
            if (k === "remark") {
                // BUG 3 FIX: data-caseno attribute add kiya — Firebase focus restore ke liye
                let escapedCaseno = String(r.caseno).replace(/"/g, '&quot;').replace(/'/g, "\\'");
                row += `<td><input data-caseno="${String(r.caseno).replace(/"/g,'&quot;')}" value="${(r[k] || "").replace(/"/g,'&quot;')}" oninput="updateRemark('${escapedCaseno}',this.value)"></td>`;
            } else {
                row += `<td>${r[k] || ""}</td>`;
            }
        });
        row += "</tr>";
        html += row;
    });
    table.innerHTML = html;
}

// ===================== Search =====================
searchBox.addEventListener("input", () => {
    drawTable(getFilteredData());
});

// ===================== BUG 4 FIX: Download — searchableText column nahi aayega =====================
function downloadExcel() {
    const exportData = currentData.map(r => ({
        srno: r.srno,
        caseno: r.caseno,
        partyname: r.partyname,
        section: r.section,
        ps: r.ps,
        sent: r.sent,
        received: r.received,
        receiveddate: r.receiveddate,
        nextdate: r.nextdate,
        remark: r.remark
    }));
    let ws = XLSX.utils.json_to_sheet(exportData);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Court Data");
    XLSX.writeFile(wb, "Court_" + workDate.value + ".xlsx");
}

</script>
</body>
</html>
