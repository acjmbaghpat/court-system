// IndexedDB setup
const DB_NAME = 'CourtFileManagerDB';
const DB_VERSION = 1;
const STORE_RECORDS = 'courtRecords';
const STORE_VERSIONS = 'versions';
const STORE_METADATA = 'metadata';

let db;

function openDatabase() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
            db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_RECORDS)) {
                const recordStore = db.createObjectStore(STORE_RECORDS, { keyPath: 'id' });
                recordStore.createIndex('workDate', 'workDate', { unique: false });
                recordStore.createIndex('caseno', 'caseno', { unique: false });
            }
            if (!db.objectStoreNames.contains(STORE_VERSIONS)) {
                db.createObjectStore(STORE_VERSIONS, { keyPath: 'workDate' });
            }
            if (!db.objectStoreNames.contains(STORE_METADATA)) {
                db.createObjectStore(STORE_METADATA, { keyPath: 'key' });
            }
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            resolve(db);
        };

        request.onerror = (event) => {
            console.error("IndexedDB error:", event.target.errorCode);
            reject("IndexedDB error: " + event.target.errorCode);
        };
    });
}

async function getObjectStore(storeName, mode) {
    if (!db) {
        await openDatabase();
    }
    const transaction = db.transaction(storeName, mode);
    return transaction.objectStore(storeName);
}

async function idbAddRecord(record) {
    const store = await getObjectStore(STORE_RECORDS, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.add(record);
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbPutRecord(record) {
    const store = await getObjectStore(STORE_RECORDS, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.put(record);
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbGetRecordsByWorkDate(workDate) {
    const store = await getObjectStore(STORE_RECORDS, 'readonly');
    const index = store.index('workDate');
    return new Promise((resolve, reject) => {
        const request = index.getAll(workDate);
        request.onsuccess = () => resolve(request.result);
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbGetAllRecords() {
    const store = await getObjectStore(STORE_RECORDS, 'readonly');
    return new Promise((resolve, reject) => {
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbDeleteRecord(id) {
    const store = await getObjectStore(STORE_RECORDS, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.delete(id);
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbClearRecordsByWorkDate(workDate) {
    const store = await getObjectStore(STORE_RECORDS, 'readwrite');
    const index = store.index('workDate');
    return new Promise((resolve, reject) => {
        const request = index.openCursor(IDBKeyRange.only(workDate));
        request.onsuccess = (event) => {
            const cursor = event.target.result;
            if (cursor) {
                cursor.delete();
                cursor.continue();
            } else {
                resolve();
            }
        };
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbGetVersions(workDate) {
    const store = await getObjectStore(STORE_VERSIONS, 'readonly');
    return new Promise((resolve, reject) => {
        const request = store.get(workDate);
        request.onsuccess = () => resolve(request.result ? request.result.versions : []);
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbSaveVersions(workDate, versions) {
    const store = await getObjectStore(STORE_VERSIONS, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.put({ workDate, versions });
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbGetCurrentVersion(workDate) {
    const store = await getObjectStore(STORE_METADATA, 'readonly');
    return new Promise((resolve, reject) => {
        const request = store.get('current_version_' + workDate);
        request.onsuccess = () => resolve(request.result ? request.result.value : 1);
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbSaveCurrentVersion(workDate, version) {
    const store = await getObjectStore(STORE_METADATA, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.put({ key: 'current_version_' + workDate, value: version });
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}


/* HELPER FUNCTIONS */
function sanitizeId(id) {
    return id.replace(/[^a-zA-Z0-9-_]/g, '_');
}

function generateSearchableText(record) {
    return Object.values(record).filter(val => typeof val === 'string' || typeof val === 'number').join(' ').toLowerCase();
}

/* SPEAKER */
function speak(msg){
    let speech=new SpeechSynthesisUtterance(msg)
    speech.lang="en-IN"
    speech.rate=1
    speechSynthesis.speak(speech)
}

function speakNextDate(dateStr){
    if(!dateStr)return
    let d=new Date(dateStr)
    let day=d.getDate()
    let month=d.toLocaleString("en-IN",{month:"long"})
    speak("Next date "+day+" "+month)
}

/* STORAGE - Updated for IndexedDB */
async function updateStorageUsage(){
    // IndexedDB storage estimation is more complex and browser-dependent.
    // For simplicity, we'll just log a message for now or use a placeholder.
    // A more accurate estimation would involve querying navigator.storage.estimate()
    // which is asynchronous and requires user permission in some browsers.
    console.log("IndexedDB usage is managed by the browser. No direct usage display like localStorage.");
    storageUsage.innerText="N/A"; // Placeholder
}

/* DELETE OLD - Updated for IndexedDB */
async function deleteOldData(){
    let today=new Date()
    let deletedCount = 0;
    try {
        const allRecords = await idbGetAllRecords();
        for (const record of allRecords) {
            // Assuming record.workDate is in 'YYYY-MM-DD' format
            let fileDate = new Date(record.workDate);
            let diff = (today - fileDate) / (1000 * 60 * 60 * 24);
            if (diff > 30) {
                await idbDeleteRecord(record.id);
                deletedCount++;
            }
        }
        alert(deletedCount + " old records deleted from IndexedDB.");
        // No need to update storage usage for IndexedDB in the same way as localStorage
    } catch (error) {
        console.error("Error deleting old data from IndexedDB:", error);
        alert("Failed to delete old data.");
    }
}

/* LOCAL - Updated for IndexedDB */
async function saveLocal(){
    try {
        // Clear existing records for the current workDate and version
        // Then add all currentData records
        await idbClearRecordsByWorkDate(workDate.value); // This might be too aggressive if versions are meant to coexist
        // For versioning, we need to store data per version, not just per date.
        // Let's adjust: each record will have a 'version' field.
        // For now, I'll just save the currentData as a whole under a specific key in IndexedDB.
        // A better approach would be to add a 'version' field to each record and query by it.
        // For simplicity and to maintain currentData structure, I'll clear and re-add for the current date/version.

        // Alternative: Store currentData as a single blob per dataKey in a separate object store if currentData is always the full dataset for a version
        const store = await getObjectStore(STORE_METADATA, 'readwrite'); // Using metadata store for this
        await new Promise((resolve, reject) => {
            const request = store.put({ key: await dataKey(), value: currentData });
            request.onsuccess = () => resolve();
            request.onerror = (event) => reject(event.target.error);
        });

        updateStorageUsage();
    } catch (e) {
        console.error("Error saving to IndexedDB:", e);
        alert("Failed to save data locally. IndexedDB error.");
    }
}

async function loadLocal(){
    try {
        const key = await dataKey();
        const store = await getObjectStore(STORE_METADATA, 'readonly');
        const request = store.get(key);
        await new Promise((resolve, reject) => {
            request.onsuccess = () => {
                if(request.result && request.result.value){
                    currentData = request.result.value;
                    currentData.forEach(r => r.searchableText = generateSearchableText(r));
                    drawTable(getFilteredData());
                    updateDashboard();
                } else {
                    currentData = [];
                    drawTable([]);
                    updateDashboard();
                }
                resolve();
            };
            request.onerror = (event) => reject(event.target.error);
        });
    } catch (e) {
        console.error("Error loading from IndexedDB:", e);
        alert("Failed to load data locally. Data might be corrupted or not found.");
        currentData = [];
    }
}

/* FIREBASE FIXED - Added error handling */
async function syncFirebase(){
    let id=workDate.value+"_"+uploadVersion
    try {
        await dbCloud.collection("courtfiles").doc(id).set({data:currentData},{merge:true});
        console.log("Firebase sync successful for ID:", id);
    } catch (error) {
        console.error("Error syncing to Firebase:", error);
        alert("Failed to sync data to cloud. Please check your connection.");
    }
}

function loadFirebase(){
    let id=workDate.value+"_"+uploadVersion
    if(unsubscribe)unsubscribe()
    try {
        unsubscribe=dbCloud.collection("courtfiles").doc(id)
        .onSnapshot(doc=>{
            if(doc.exists){
                currentData = doc.data().data || []
                currentData.forEach(r => r.searchableText = generateSearchableText(r));
                drawTable(getFilteredData())
                updateDashboard()
                saveLocal()
            } else {
                console.log("No Firebase data for ID:", id, ". Loading local data if available.");
                loadLocal(); 
            }
        }, error => {
            console.error("Error listening to Firebase snapshot:", error);
            alert("Failed to load cloud data. Displaying local data if available.");
            loadLocal(); // Fallback to local data on error
        })
    } catch (error) {
        console.error("Error setting up Firebase snapshot listener:", error);
        alert("Failed to connect to cloud. Displaying local data if available.");
        loadLocal(); // Fallback to local data on error
    }
}

/* EXCEL */
async function uploadExcel(){
    let file=excelFile.files[0]
    if(!file){alert("Select Excel");return}
    let versions = await idbGetVersions(workDate.value);
    uploadVersion=versions.length+1
    
    let reader=new FileReader()
    reader.onload=async e=>{
        let wb=XLSX.read(e.target.result,{type:"binary"})
        let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""})
        rows.shift()
        
        currentData=rows.map(r=>{
            const record = {
                id: workDate.value + '_' + uploadVersion + '_' + String(r[1]||"").trim(), // Unique ID for IndexedDB
                srno:r[0]||"",
                caseno:String(r[1]||"").trim(),
                partyname:r[2]||"",
                section:r[3]||"",
                ps:r[4]||"",
                sent:"",
                received:"",
                receiveddate:"",
                nextdate:"",
                remark:""
            };
            record.searchableText = generateSearchableText(record);
            return record;
        })
        
        let opt=document.createElement("option")
        opt.value=uploadVersion
        opt.text="Upload "+uploadVersion
        versionSelect.appendChild(opt)
        versionSelect.value=uploadVersion
        
        versions.push(uploadVersion)
        await saveVersions(workDate.value, versions);
        await saveCurrentVersion()
        
        drawTable(getFilteredData())
        updateDashboard()
        await saveLocal()
        syncFirebase()
        
        speak("Excel uploaded")
        excelFile.value=""
    }
    reader.readAsBinaryString(file)
}

/* SCANNER FIXED */
function scanSent(){scanMode="SENT";startScanner()}
function scanReceived(){scanMode="RECEIVED";startScanner()}

async function startScanner(){
    scannerWrap.style.display="block"
    html5Qr=new Html5Qrcode("video")
    try {
        let devices=await Html5Qrcode.getCameras()
        if (devices.length === 0) {
            alert("No camera found.");
            speak("No camera found.");
            stopScanner();
            return;
        }
        let cam = devices.find(d => d.label.toLowerCase().includes("back")) || devices[devices.length-1];
        if (!cam) {
            alert("Could not find a suitable camera.");
            speak("Could not find a suitable camera.");
            stopScanner();
            return;
        }
        html5Qr.start(
            cam.id,
            { fps:10, qrbox:250 },
            (text)=>handleScan(text.trim()),
            (errorMessage) => { /* Optional: handle scan errors */ }
        )
    } catch (error) {
        console.error("Error starting scanner:", error);
        alert("Failed to start scanner. Please ensure camera permissions are granted.");
        speak("Failed to start scanner.");
        stopScanner();
    }
}

function stopScanner(){
    if(html5Qr){
        html5Qr.stop().then(()=>html5Qr.clear()).catch(error => console.error("Error stopping scanner:", error));
        html5Qr=null
    }
    scannerWrap.style.display="none"
}

/* SCAN - Improved debouncing and error handling */
async function handleScan(code){
    let now=Date.now()
    if(code===lastScanCode && now-lastScanTime<1500) {
        console.log("Duplicate scan ignored:", code);
        return;
    }
    lastScanCode=code;
    lastScanTime=now;

    let idx=currentData.findIndex(r=>r.caseno===code)
    if(idx===-1){alert("File Not Found");speak("File not found");return}
    
    if(scanMode==="SENT"){
        if(currentData[idx].sent==="Sent"){alert("Already Sent");speak("Already sent");return}
        currentData[idx].sent="Sent"
        alert("Sent")
        speak("File sent")
    }
    
    if(scanMode==="RECEIVED"){
        if(currentData[idx].sent!=="Sent"){alert("File Not Sent Yet");speak("File not sent yet");return}
        if(currentData[idx].received==="Received"){alert("Already Received");speak("Already received");return}
        currentData[idx].received="Received"
        currentData[idx].receiveddate=new Date().toISOString().split("T")[0]
        lastReceivedIndex=idx
        alert("Received")
        speak("File received")
        nextDatePopup.style.display="block"
    }
    
    drawTable(getFilteredData())
    scrollToFile(code)
    updateDashboard()
    await saveLocal()
    syncFirebase()
}

/* SCROLL */
function scrollToFile(caseno){
    let sanitizedCaseno = sanitizeId(caseno);
    let row=document.getElementById("row_"+sanitizedCaseno)
    if(!row)return
    row.scrollIntoView({behavior:"smooth",block:"center"})
    row.classList.add("highlight")
    setTimeout(()=>{row.classList.remove("highlight")},3000)
}

}

}

/* REMARK FIXED */
let remarkTimeout
async function updateRemark(caseNo,val){
    clearTimeout(remarkTimeout)
    remarkTimeout=setTimeout(async()=>{
        let idx=currentData.findIndex(r=>r.caseno===caseNo)
        if(idx!==-1){
            currentData[idx].remark=val
            currentData[idx].searchableText = generateSearchableText(currentData[idx]);
            await saveLocal()
            syncFirebase()
        }
    },400)
}

/* TABLE */
function drawTable(data){
    if(!data.length){table.innerHTML="";return}
    let headers=["srno","caseno","partyname","section","ps","sent","received","receiveddate","nextdate","remark"]
    let html="<tr>"+headers.map(x=>"<th>"+x+"</th>").join("")+"</tr>"
    data.forEach(r=>{
        let sanitizedCaseno = sanitizeId(r.caseno);
        let row=`<tr id="row_${sanitizedCaseno}">`
        headers.forEach(k=>{
            if(k==="remark"){
                row+=`<td><input value="${r[k]||""}" oninput="updateRemark(\'${r.caseno.replace(/\\'/g, "\\\\'")}\',this.value)"></td>`
            }else{
                row+=`<td>${r[k]||""}</td>`
            }
        })
        row+="</tr>"
        html+=row
    })
    table.innerHTML=html
}
