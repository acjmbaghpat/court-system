// IndexedDB setup
const DB_NAME = 'CourtFileManagerDB';
const DB_VERSION = 1;
const STORE_VERSIONS = 'versions';
const STORE_METADATA = 'metadata';

let db;

function openDatabase() {
    return new Promise((resolve, reject) => {
        if (db) return resolve(db);
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
            const dbInstance = event.target.result;
            if (!dbInstance.objectStoreNames.contains(STORE_VERSIONS)) {
                dbInstance.createObjectStore(STORE_VERSIONS, { keyPath: 'workDate' });
            }
            if (!dbInstance.objectStoreNames.contains(STORE_METADATA)) {
                dbInstance.createObjectStore(STORE_METADATA, { keyPath: 'key' });
            }
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            resolve(db);
        };

        request.onerror = (event) => {
            console.error("IndexedDB error:", event.target.errorCode);
            reject("IndexedDB error: " + event.target.errorCode);
        };
    });
}

async function getObjectStore(storeName, mode) {
    if (!db) {
        await openDatabase();
    }
    const transaction = db.transaction(storeName, mode);
    return transaction.objectStore(storeName);
}

async function idbDeleteMetadata(key) {
    const store = await getObjectStore(STORE_METADATA, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.delete(key);
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbGetVersions(workDate) {
    const store = await getObjectStore(STORE_VERSIONS, 'readonly');
    return new Promise((resolve, reject) => {
        const request = store.get(workDate);
        request.onsuccess = () => resolve(request.result ? request.result.versions : []);
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbSaveVersions(workDate, versions) {
    const store = await getObjectStore(STORE_VERSIONS, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.put({ workDate, versions });
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbGetCurrentVersion(workDate) {
    const store = await getObjectStore(STORE_METADATA, 'readonly');
    return new Promise((resolve, reject) => {
        const request = store.get('current_version_' + workDate);
        request.onsuccess = () => resolve(request.result ? request.result.value : 1);
        request.onerror = (event) => reject(event.target.error);
    });
}

async function idbSaveCurrentVersion(workDate, version) {
    const store = await getObjectStore(STORE_METADATA, 'readwrite');
    return new Promise((resolve, reject) => {
        const request = store.put({ key: 'current_version_' + workDate, value: version });
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
    });
}


/* HELPER FUNCTIONS */
function sanitizeId(id) {
    return String(id || "").replace(/[^a-zA-Z0-9-_]/g, '_');
}

function generateSearchableText(record) {
    return Object.values(record).filter(val => typeof val === 'string' || typeof val === 'number').join(' ').toLowerCase();
}

/* SPEAKER */
function speak(msg){
    let speech=new SpeechSynthesisUtterance(msg)
    speech.lang="en-IN"
    speech.rate=1
    speechSynthesis.speak(speech)
}

function speakNextDate(dateStr){
    if(!dateStr)return
    let d=new Date(dateStr)
    let day=d.getDate()
    let month=d.toLocaleString("en-IN",{month:"long"})
    speak("Next date "+day+" "+month)
}

/* STORAGE */
async function updateStorageUsage(){
    storageUsage.innerText="IndexedDB";
}

/* DELETE OLD */
async function deleteOldData(){
    let today=new Date()
    let deletedCount = 0;
    try {
        const store = await getObjectStore(STORE_METADATA, 'readwrite');
        const request = store.getAllKeys();
        request.onsuccess = async () => {
            const keys = request.result;
            for (const key of keys) {
                if (key.includes('_') && !key.startsWith('current_version_') && !key.startsWith('last_')) {
                    let datePart = key.split('_')[0];
                    let fileDate = new Date(datePart);
                    if (!isNaN(fileDate)) {
                        let diff = (today - fileDate) / (1000 * 60 * 60 * 24);
                        if (diff > 30) {
                            await idbDeleteMetadata(key);
                            deletedCount++;
                        }
                    }
                }
            }
            alert(deletedCount + " old version records deleted.");
        };
    } catch (error) {
        console.error("Error deleting old data:", error);
        alert("Failed to delete old data.");
    }
}

}

firebase.initializeApp(firebaseConfig)
const dbCloud=firebase.firestore()

let currentData=[]
let uploadVersion=1
let scanMode=""
let html5Qr=null
let lastReceivedIndex=null
let unsubscribe=null

let lastScanCode=""
let lastScanTime=0

async function dataKey(){ return workDate.value + "_" + uploadVersion; }

/* FILTER */
function getFilteredData(){
    let q=searchBox.value.toLowerCase()
    return q
    ? currentData.filter(r=>r.searchableText && r.searchableText.includes(q))
    : currentData
}

/* LOAD */
window.onload=async()=>{
    try {
        await openDatabase();
        
        // Restore last used date or default to today
        let savedDate = localStorage.getItem('lastWorkDate');
        let today = new Date().toISOString().split("T")[0];
        workDate.value = savedDate || today;
        
        await loadVersions()
        await loadCurrentVersion()
        await loadLocal()
        loadFirebase()
        updateStorageUsage()
    } catch (e) {
        console.error("Initialization error:", e);
    }
}

/* DASHBOARD */
function updateDashboard(){
    totalCount.innerText=currentData.length
    sentCount.innerText=currentData.filter(x=>x.sent==="Sent").length
    receivedCount.innerText=currentData.filter(x=>x.received==="Received").length
}

/* VERSION */
async function saveVersions(arr){
    await idbSaveVersions(workDate.value, arr);
}

async function loadVersions(){
    versionSelect.innerHTML=""
    const versions = await idbGetVersions(workDate.value);
    if(versions.length === 0) {
        let opt=document.createElement("option")
        opt.value="1"
        opt.text="Upload 1"
        versionSelect.appendChild(opt)
        return;
    }
    versions.forEach(v=>{
        let opt=document.createElement("option")
        opt.value=v
        opt.text="Upload "+v
        versionSelect.appendChild(opt)
    })
}

async function saveCurrentVersion(){
    await idbSaveCurrentVersion(workDate.value, uploadVersion);
}

async function loadCurrentVersion(){
    const v = await idbGetCurrentVersion(workDate.value);
    uploadVersion = parseInt(v);
    versionSelect.value = uploadVersion;
}

/* LOCAL */
async function saveLocal(){
    try {
        const key = await dataKey();
        const store = await getObjectStore(STORE_METADATA, 'readwrite');
        await new Promise((resolve, reject) => {
            const request = store.put({ key: key, value: currentData });
            request.onsuccess = () => resolve();
            request.onerror = (event) => reject(event.target.error);
        });
    } catch (e) {
        console.error("Error saving to IndexedDB:", e);
    }
}

async function loadLocal(){
    try {
        const key = await dataKey();
        const store = await getObjectStore(STORE_METADATA, 'readonly');
        const request = store.get(key);
        await new Promise((resolve, reject) => {
            request.onsuccess = () => {
                if(request.result && request.result.value){
                    currentData = request.result.value;
                    currentData.forEach(r => r.searchableText = generateSearchableText(r));
                } else {
                    currentData = [];
                }
                drawTable(getFilteredData());
                updateDashboard();
                resolve();
            };
            request.onerror = (event) => reject(event.target.error);
        });
    } catch (e) {
        console.error("Error loading from IndexedDB:", e);
        currentData = [];
        drawTable([]);
        updateDashboard();
    }
}

/* FIREBASE */
async function syncFirebase(){
    let id=workDate.value+"_"+uploadVersion
    try {
        await dbCloud.collection("courtfiles").doc(id).set({data:currentData},{merge:true});
    } catch (error) {
        console.error("Error syncing to Firebase:", error);
    }
}

function loadFirebase(){
    let id=workDate.value+"_"+uploadVersion
    if(unsubscribe)unsubscribe()
    try {
        unsubscribe=dbCloud.collection("courtfiles").doc(id)
        .onSnapshot(doc=>{
            if(doc.exists){
                currentData = doc.data().data || []
                currentData.forEach(r => r.searchableText = generateSearchableText(r));
                drawTable(getFilteredData())
                updateDashboard()
                saveLocal()
            }
        }, error => {
            console.error("Firebase error:", error);
        })
    } catch (error) {
        console.error("Firebase setup error:", error);
    }
}

/* DATE CHANGE */
workDate.addEventListener("change",async()=>{
    localStorage.setItem('lastWorkDate', workDate.value);
    await loadVersions()
    await loadCurrentVersion()
    await loadLocal()
    loadFirebase()
})

versionSelect.addEventListener("change",async()=>{
    uploadVersion=parseInt(versionSelect.value)
    await saveCurrentVersion()
    await loadLocal()
    loadFirebase()
})

/* EXCEL */
async function uploadExcel(){
    let file=excelFile.files[0]
    if(!file){alert("Select Excel");return}
    
    try {
        let versions = await idbGetVersions(workDate.value);
        uploadVersion=versions.length+1
        
        let reader=new FileReader()
        reader.onload=async e=>{
            try {
                let data = e.target.result;
                let wb=XLSX.read(data,{type:"binary"})
                let sheetName = wb.SheetNames[0];
                let rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:""})
                
                if(rows.length > 0) rows.shift(); // Remove header
                
                currentData=rows.map(r=>{
                    const record = {
                        srno:r[0]||"",
                        caseno:String(r[1]||"").trim(),
                        partyname:r[2]||"",
                        section:r[3]||"",
                        ps:r[4]||"",
                        sent:"",
                        received:"",
                        receiveddate:"",
                        nextdate:"",
                        remark:""
                    };
                    record.searchableText = generateSearchableText(record);
                    return record;
                }).filter(r => r.caseno !== ""); // Filter out empty case numbers
                
                let opt=document.createElement("option")
                opt.value=uploadVersion
                opt.text="Upload "+uploadVersion
                versionSelect.appendChild(opt)
                versionSelect.value=uploadVersion
                
                versions.push(uploadVersion)
                await saveVersions(workDate.value, versions);
                await saveCurrentVersion()
                
                drawTable(getFilteredData())
                updateDashboard()
                await saveLocal()
                syncFirebase()
                
                speak("Excel uploaded")
                alert("Excel uploaded successfully!");
                excelFile.value=""
            } catch (err) {
                console.error("Excel processing error:", err);
                alert("Error processing Excel file.");
            }
        }
        reader.onerror = () => alert("Error reading file.");
        reader.readAsBinaryString(file)
    } catch (err) {
        console.error("Upload error:", err);
        alert("Upload failed.");
    }
}

/* SCANNER */
function scanSent(){scanMode="SENT";startScanner()}
function scanReceived(){scanMode="RECEIVED";startScanner()}

async function startScanner(){
    scannerWrap.style.display="block"
    html5Qr=new Html5Qrcode("video")
    try {
        let devices=await Html5Qrcode.getCameras()
        if (devices.length === 0) {
            alert("No camera found.");
            stopScanner();
            return;
        }
        let cam = devices.find(d => d.label.toLowerCase().includes("back")) || devices[devices.length-1];
        html5Qr.start(
            cam.id,
            { fps:10, qrbox:250 },
            (text)=>handleScan(text.trim())
        )
    } catch (error) {
        console.error("Scanner error:", error);
        stopScanner();
    }
}

function stopScanner(){
    if(html5Qr){
        html5Qr.stop().then(()=>html5Qr.clear()).catch(e => console.error(e));
        html5Qr=null
    }
    scannerWrap.style.display="none"
}

async function handleScan(code){
    let now=Date.now()
    if(code===lastScanCode && now-lastScanTime<1500) return;
    lastScanCode=code;
    lastScanTime=now;

    let idx=currentData.findIndex(r=>r.caseno===code)
    if(idx===-1){alert("File Not Found");speak("File not found");return}
    
    if(scanMode==="SENT"){
        if(currentData[idx].sent==="Sent"){alert("Already Sent");speak("Already sent");return}
        currentData[idx].sent="Sent"
        alert("Sent")
        speak("File sent")
    }
    
    if(scanMode==="RECEIVED"){
        if(currentData[idx].sent!=="Sent"){alert("File Not Sent Yet");speak("File not sent yet");return}
        if(currentData[idx].received==="Received"){alert("Already Received");speak("Already received");return}
        currentData[idx].received="Received"
        currentData[idx].receiveddate=new Date().toISOString().split("T")[0]
        lastReceivedIndex=idx
        alert("Received")
        speak("File received")
        nextDatePopup.style.display="block"
    }
    
    drawTable(getFilteredData())
    scrollToFile(code)
    updateDashboard()
    await saveLocal()
    syncFirebase()
}

/* SCROLL */
function scrollToFile(caseno){
    let sanitizedCaseno = sanitizeId(caseno);
    let row=document.getElementById("row_"+sanitizedCaseno)
    if(!row)return
    row.scrollIntoView({behavior:"smooth",block:"center"})
    row.classList.add("highlight")
    setTimeout(()=>{row.classList.remove("highlight")},3000)
}

/* NEXT DATE */
async function saveNextDate(){
    if(lastReceivedIndex===null)return
    let selectedDate=nextDateInput.value
    if(!selectedDate){alert("Please select a date");return}
    currentData[lastReceivedIndex].nextdate=selectedDate
    nextDateInput.value = '';
    nextDatePopup.style.display="none"
    lastReceivedIndex=null
    drawTable(getFilteredData())
    speakNextDate(selectedDate)
    await saveLocal()
    syncFirebase()
}

function closePopup(){
    nextDatePopup.style.display="none"
    lastReceivedIndex=null
}

/* REMARK */
let remarkTimeout
async function updateRemark(caseNo,val){
    clearTimeout(remarkTimeout)
    remarkTimeout=setTimeout(async()=>{
        let idx=currentData.findIndex(r=>r.caseno===caseNo)
        if(idx!==-1){
            currentData[idx].remark=val
            currentData[idx].searchableText = generateSearchableText(currentData[idx]);
            await saveLocal()
            syncFirebase()
        }
    },400)
}

/* TABLE */
function drawTable(data){
    if(!data || !data.length){table.innerHTML="";return}
    let headers=["srno","caseno","partyname","section","ps","sent","received","receiveddate","nextdate","remark"]
    let html="<tr>"+headers.map(x=>"<th>"+x+"</th>").join("")+"</tr>"
    data.forEach(r=>{
        let sanitizedCaseno = sanitizeId(r.caseno);
        let row=`<tr id="row_${sanitizedCaseno}">`
        headers.forEach(k=>{
            if(k==="remark"){
                let escapedCaseno = String(r.caseno).replace(/'/g, "\\'");
                row+=`<td><input value="${r[k]||""}" oninput="updateRemark('${escapedCaseno}',this.value)"></td>`
            }else{
                row+=`<td>${r[k]||""}</td>`
            }
        })
        row+="</tr>"
        html+=row
    })
    table.innerHTML=html
}

/* SEARCH */
searchBox.addEventListener("input",()=>{
    drawTable(getFilteredData())
})
