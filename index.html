<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Court File Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>

body{font-family:system-ui;background:#f2f4f7;margin:0;padding:10px}

.section{background:#fff;padding:14px;margin-bottom:12px;border-radius:12px}

input,button,select{
width:100%;padding:12px;margin-top:8px;font-size:15px;border-radius:10px;border:1px solid #ccc
}

button{background:#1976d2;color:#fff;border:none}

.scan-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.dashboard{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}

.card{background:#fff;padding:10px;border-radius:10px;text-align:center;font-weight:600}

.table-wrap{background:#fff;border-radius:12px;overflow-x:auto}

table{width:100%;border-collapse:collapse;min-width:900px}

th,td{border:1px solid #ddd;padding:6px;font-size:13px}

#scannerWrap{position:fixed;inset:0;background:#000;display:none;z-index:999}

#video{width:100%;height:75vh;object-fit:cover}

#nextDatePopup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:1000}

#popupBox{background:#fff;margin:25% auto;padding:20px;width:90%;border-radius:12px}

.highlight{
background:#fff3cd;
animation:blink 1s 3;
}

@keyframes blink{
0%{background:#fff3cd}
50%{background:#ffffff}
100%{background:#fff3cd}
}

</style>
</head>

<body>

<div class="section">
<h3>📅 Working Date</h3>
<input type="date" id="workDate">
</div>

<div class="dashboard">
<div class="card">📁 Total<br><span id="totalCount">0</span></div>
<div class="card">📤 Sent<br><span id="sentCount">0</span></div>
<div class="card">📥 Received<br><span id="receivedCount">0</span></div>
</div>

<div class="section">
<h3>📥 Excel Upload</h3>
<input type="file" id="excelFile">
<button onclick="uploadExcel()">Upload Excel</button>
</div>

<div class="section">
<h3>🔍 Search</h3>
<input type="text" id="searchBox">
</div>

<div class="section">
<h3>📷 Scan</h3>
<div class="scan-grid">
<button onclick="scanSent()">📤 Scan SENT</button>
<button onclick="scanReceived()">📥 Scan RECEIVED</button>
</div>
</div>

<div class="section">
<button onclick="downloadExcel()">📤 Download Excel</button>
</div>

<div class="table-wrap">
<table id="table"></table>
</div>

<div id="scannerWrap">
<video id="video"></video>
<button onclick="stopScanner()">Close Scanner</button>
</div>

<div id="nextDatePopup">
<div id="popupBox">
<h3>📅 Next Date</h3>
<input type="date" id="nextDateInput">
<button onclick="saveNextDate()">Save</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyCOeaQ3R9hTqVqpBDw9v3RNWE-P7rYQg64",
authDomain:"court-file-system.firebaseapp.com",
projectId:"court-file-system"
};

firebase.initializeApp(firebaseConfig);
const dbCloud=firebase.firestore();

/* VARIABLES */

let currentData=[];
let uploadVersion=1;
let scanMode="";
let scanner=null;
let lastReceivedIndex=null;
let unsubscribe=null;

function dataKey(){
return "court_"+workDate.value+"_"+uploadVersion;
}

/* VOICE */

function speak(msg){
let speech=new SpeechSynthesisUtterance(msg);
speech.lang="en-IN";
speech.rate=1;
speechSynthesis.speak(speech);
}

function speakNextDate(dateStr){
let d=new Date(dateStr);
let day=d.getDate();
let month=d.toLocaleString("en-IN",{month:"long"});
speak("Next date "+day+" "+month);
}

/* STORAGE */

function saveLocal(){
localStorage.setItem(dataKey(),JSON.stringify(currentData));
}

function loadLocal(){

let saved=localStorage.getItem(dataKey());

if(saved){

currentData=JSON.parse(saved);

drawTable(currentData);
updateDashboard();

}

}

/* FIREBASE */

function syncFirebase(){

let id=workDate.value+"_"+uploadVersion;

dbCloud.collection("courtfiles")
.doc(id)
.set({data:currentData},{merge:true});

}

function loadFirebase(){

let id=workDate.value+"_"+uploadVersion;

if(unsubscribe) unsubscribe();

unsubscribe=dbCloud.collection("courtfiles")
.doc(id)
.onSnapshot(doc=>{

if(doc.exists){

currentData=doc.data().data;

drawTable(currentData);
updateDashboard();

saveLocal();

}

});

}

/* PAGE LOAD */

window.onload=()=>{

let today=new Date().toISOString().split("T")[0];

workDate.value=today;

loadLocal();
loadFirebase();

}

/* DASHBOARD */

function updateDashboard(){

totalCount.innerText=currentData.length;
sentCount.innerText=currentData.filter(x=>x.sent==="Sent").length;
receivedCount.innerText=currentData.filter(x=>x.received==="Received").length;

}

/* EXCEL UPLOAD */

function uploadExcel(){

let file=excelFile.files[0];

if(!file){
alert("Select Excel");
return;
}

let reader=new FileReader();

reader.onload=e=>{

let wb=XLSX.read(e.target.result,{type:"binary"});

let rows=XLSX.utils.sheet_to_json(
wb.Sheets[wb.SheetNames[0]],
{header:1,defval:""}
);

rows.shift();

currentData=rows.map(r=>({

srno:r[0]||"",
caseno:String(r[1]||"").trim(),
partyname:r[2]||"",
section:r[3]||"",
ps:r[4]||"",
sent:"",
received:"",
receiveddate:"",
nextdate:"",
remark:""

}));

drawTable(currentData);
updateDashboard();

saveLocal();
syncFirebase();

};

reader.readAsBinaryString(file);

}

/* SCANNER */

function scanSent(){scanMode="SENT";startScanner()}
function scanReceived(){scanMode="RECEIVED";startScanner()}

async function startScanner(){

scannerWrap.style.display="block";

scanner=new ZXing.BrowserQRCodeReader();

const devices=await scanner.listVideoInputDevices();
const cam=devices[devices.length-1];

scanner.decodeFromVideoDevice(cam.deviceId,"video",(result)=>{
if(result) handleScan(result.text.trim());
});

}

function stopScanner(){

if(scanner){
scanner.reset();
scanner=null;
}

scannerWrap.style.display="none";

}

/* SCAN */

function handleScan(code){

let idx=currentData.findIndex(r=>r.caseno===code);

if(idx===-1){
alert("❌ File Not Found");
speak("File not found");
return;
}

if(scanMode==="SENT"){
currentData[idx].sent="Sent";
alert("✅ Sent");
speak("File sent");
}

if(scanMode==="RECEIVED"){

currentData[idx].received="Received";

currentData[idx].receiveddate=new Date().toISOString().split("T")[0];

lastReceivedIndex=idx;

alert("📥 Received");
speak("File received");

nextDatePopup.style.display="block";

setTimeout(()=>{
nextDateInput.focus();
if(nextDateInput.showPicker) nextDateInput.showPicker();
},200);

}

drawTable(currentData);
scrollToFile(code);

updateDashboard();

saveLocal();
syncFirebase();

}

/* SCROLL */

function scrollToFile(caseno){

let row=document.getElementById("row_"+caseno);

if(!row) return;

row.scrollIntoView({
behavior:"smooth",
block:"center"
});

row.classList.add("highlight");

setTimeout(()=>{
row.classList.remove("highlight");
},3000);

}

/* NEXT DATE */

function saveNextDate(){

let selectedDate=nextDateInput.value;

currentData[lastReceivedIndex].nextdate=selectedDate;

nextDatePopup.style.display="none";

drawTable(currentData);

speakNextDate(selectedDate);

saveLocal();
syncFirebase();

}

function closePopup(){
nextDatePopup.style.display="none"
}

/* TABLE */

function drawTable(data){

if(!data.length){
table.innerHTML="";
return;
}

let headers=[
"srno","caseno","partyname","section","ps",
"sent","received","receiveddate","nextdate","remark"
];

let html="<tr>"+headers.map(x=>"<th>"+x+"</th>").join("")+"</tr>";

data.forEach(r=>{

let row=`<tr id="row_${r.caseno}">`;

headers.forEach(k=>{
row+=`<td>${r[k]||""}</td>`;
});

row+="</tr>";

html+=row;

});

table.innerHTML=html;

}

/* SEARCH */

searchBox.addEventListener("input",()=>{

let q=searchBox.value.toLowerCase();

let filtered=q
?currentData.filter(r=>Object.values(r).join(" ").toLowerCase().includes(q))
:currentData;

drawTable(filtered);

});

/* DOWNLOAD */

function downloadExcel(){

let ws=XLSX.utils.json_to_sheet(currentData);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Court Data");

XLSX.writeFile(wb,"Court_"+workDate.value+".xlsx");

}

</script>

</body>
</html>
