<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Court File App – Stable Fast Scan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:system-ui;
background:#f2f4f7;
margin:0;
padding:8px
}

.section{
background:#fff;
padding:14px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,.08)
}

h3{margin:0 0 8px 0}

input,button,select{
width:100%;
padding:12px;
margin-top:8px;
font-size:15px;
border-radius:10px
}

button{
background:#1976d2;
color:#fff;
border:none
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-bottom:12px
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center
}

.table-wrap{
background:#fff;
border-radius:12px;
overflow-x:auto
}

table{
width:100%;
border-collapse:collapse;
min-width:900px
}

th,td{
border:1px solid #ddd;
padding:6px
}

th{background:#e9ecf1}

#scannerWrap{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:999
}

#video{
width:100%;
height:75vh;
object-fit:cover
}

#scanBox{
position:absolute;
top:25%;
left:15%;
width:70%;
height:50%;
border:4px solid #00ff00;
border-radius:10px
}

#nextDatePopup{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
z-index:1000
}

#popupBox{
background:#fff;
margin:25% auto;
padding:20px;
width:90%;
border-radius:12px
}

</style>
</head>

<body>

<div class="section">
<h3>📅 Working Date</h3>
<input type="date" id="workDate">
<select id="versionSelect"></select>
</div>

<div class="dashboard">
<div class="card">📂 Total<br><span id="totalCount">0</span></div>
<div class="card">📤 Sent<br><span id="sentCount">0</span></div>
<div class="card">📥 Received<br><span id="receivedCount">0</span></div>
</div>

<div class="section">
<h3>📂 Excel Upload</h3>
<input type="file" id="excelFile">
<button onclick="uploadExcel()">Upload Excel</button>
</div>

<div class="section">
<h3>🔍 Search</h3>
<input type="text" id="searchBox">
</div>

<div class="section">
<h3>📸 Scan</h3>
<button onclick="scanSent()">📤 Scan SENT</button>
<button onclick="scanReceived()">📥 Scan RECEIVED</button>
</div>

<div class="section">
<button onclick="downloadExcel()">⬇ Download Excel</button>
</div>

<div class="table-wrap">
<table id="table"></table>
</div>

<div id="scannerWrap">
<div style="position:relative;">
<video id="video"></video>
<div id="scanBox"></div>
</div>
<button onclick="stopScanner()">❌ Stop Scanner</button>
</div>

<div id="nextDatePopup">
<div id="popupBox">
<h3>Select Next Date</h3>
<input type="date" id="nextDateInput">
<button onclick="saveNextDate()">Save</button>
<button onclick="closeNextDate()">Cancel</button>
</div>
</div>

<script>

let db;
let currentData=[];
let currentUploadId=null;
let scanMode="";
let scannerInstance=null;
let lastReceivedIndex=null;
let currentSearch="";

/* vibration */

function vibrate(type){

if(!navigator.vibrate) return;

if(type==="success") navigator.vibrate(200);

if(type==="received") navigator.vibrate(300);

if(type==="error") navigator.vibrate([100,100,100]);

}

/* DB */

let req=indexedDB.open("CourtDB",1);

req.onupgradeneeded=e=>{
let d=e.target.result;
d.createObjectStore("uploads",{keyPath:"id",autoIncrement:true});
};

req.onsuccess=e=>{
db=e.target.result;
};

/* dashboard */

function updateDashboard(){

let total=currentData.length;
let sent=currentData.filter(x=>x.sent==="Sent").length;
let received=currentData.filter(x=>x.received==="Received").length;

totalCount.innerText=total;
sentCount.innerText=sent;
receivedCount.innerText=received;

}

/* load version */

workDate.addEventListener("change",loadVersions);

function loadVersions(){

if(!db){alert("DB loading");return;}

let tx=db.transaction("uploads","readonly");
let store=tx.objectStore("uploads");

store.getAll().onsuccess=e=>{

let data=e.target.result.filter(r=>r.date===workDate.value);

versionSelect.innerHTML="";

data.forEach(r=>{
let opt=document.createElement("option");
opt.value=r.id;
opt.textContent="Upload "+r.version;
versionSelect.appendChild(opt);
});

if(data.length){
let latest=data[data.length-1];
currentUploadId=latest.id;
currentData=latest.data;
applySearch();
updateDashboard();
}

};

}

/* upload */

function uploadExcel(){

if(!workDate.value){alert("Select date");return;}

let file=excelFile.files[0];
if(!file){alert("Select Excel");return;}

let reader=new FileReader();

reader.onload=e=>{

let wb=XLSX.read(e.target.result,{type:"binary"});
let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});
rows.shift();

let newData=rows.map(r=>({

srno:r[0]||"",
caseno:String(r[1]||"").trim(),
partyname:r[2]||"",
section:r[3]||"",
ps:r[4]||"",
sent:"",
received:"",
receiveddate:"",
nextdate:"",
remark:""

}));

let tx=db.transaction("uploads","readwrite");
let store=tx.objectStore("uploads");

store.getAll().onsuccess=ev=>{

let same=ev.target.result.filter(r=>r.date===workDate.value);
let version=same.length+1;

store.add({
date:workDate.value,
version:version,
data:newData
}).onsuccess=ev2=>{

currentUploadId=ev2.target.result;
currentData=newData;

alert("Upload "+version+" saved");

applySearch();
updateDashboard();

};

};

};

reader.readAsBinaryString(file);

}

/* save */

function saveToDB(){

let tx=db.transaction("uploads","readwrite");
let store=tx.objectStore("uploads");

store.get(currentUploadId).onsuccess=e=>{
let rec=e.target.result;
rec.data=currentData;
store.put(rec);
};

}

/* search */

searchBox.addEventListener("input",()=>{
currentSearch=searchBox.value.toLowerCase();
applySearch();
});

function applySearch(){

let filtered=currentSearch
? currentData.filter(r=>Object.values(r).join(" ").toLowerCase().includes(currentSearch))
: currentData;

drawTable(filtered);

}

/* scanner */

function scanSent(){
scanMode="SENT";
startScanner();
}

function scanReceived(){
scanMode="RECEIVED";
startScanner();
}

async function startScanner(){

try{

scannerWrap.style.display="block";

scannerInstance=new ZXing.BrowserQRCodeReader();

const devices=await scannerInstance.listVideoInputDevices();

const cam=devices.find(d=>d.label.toLowerCase().includes("back"))||devices[0];

scannerInstance.decodeFromVideoDevice(cam.deviceId,"video",(result)=>{

if(result){

let code=result.text.trim();

handleScan(code);

}

});

}

catch(err){

alert("Camera error "+err.message);
stopScanner();

}

}

function stopScanner(){

if(scannerInstance){
scannerInstance.reset();
scannerInstance=null;
}

scannerWrap.style.display="none";

}

/* handle scan */

function handleScan(code){

let idx=currentData.findIndex(r=>r.caseno===code);

if(idx===-1){
alert("❌ File Not Found");
vibrate("error");
return;
}

if(scanMode==="SENT"){

if(currentData[idx].sent==="Sent"){
alert("❌ Already Sent");
vibrate("error");
return;
}

currentData[idx].sent="Sent";

saveToDB();
applySearch();
updateDashboard();

vibrate("success");

}

if(scanMode==="RECEIVED"){

if(currentData[idx].sent!=="Sent"){
alert("❌ Not Sent Yet");
vibrate("error");
return;
}

if(currentData[idx].received==="Received"){
alert("❌ Already Received");
vibrate("error");
return;
}

currentData[idx].received="Received";
currentData[idx].receiveddate=new Date().toLocaleDateString();

lastReceivedIndex=idx;

saveToDB();
applySearch();
updateDashboard();

vibrate("received");

nextDatePopup.style.display="block";

}

}

/* next date */

function saveNextDate(){

if(!nextDateInput.value){
alert("Select next date");
return;
}

currentData[lastReceivedIndex].nextdate=nextDateInput.value;

nextDatePopup.style.display="none";

saveToDB();
applySearch();

}

function closeNextDate(){
nextDatePopup.style.display="none";
}

/* remark */

function updateRemark(index,val){
currentData[index].remark=val;
saveToDB();
}

/* table */

function drawTable(data){

table.innerHTML="";

if(!data.length) return;

let h=Object.keys(data[0]);

table.innerHTML="<tr>"+h.map(x=>"<th>"+x+"</th>").join("")+"</tr>";

data.forEach(r=>{

let originalIndex=currentData.indexOf(r);

let row="<tr>";

h.forEach(k=>{

if(k==="remark"){
row+=`<td><input value="${r[k]}" onchange="updateRemark(${originalIndex},this.value)"></td>`;
}else{
row+=`<td>${r[k]}</td>`;
}

});

row+="</tr>";

table.innerHTML+=row;

});

}

/* download */

function downloadExcel(){

if(!currentData.length){alert("No data");return;}

let ws=XLSX.utils.json_to_sheet(currentData);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Court Data");

XLSX.writeFile(wb,"Court_"+workDate.value+".xlsx");

}

</script>

</body>
</html>
